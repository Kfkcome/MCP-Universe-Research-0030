name: Issue Comment Automation
on:
  issues:
    types: [opened]
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { labels } = context.payload.issue;
            let comment = '';
            if (labels.some(label => label.name === 'bug')) {
              comment = 'Thank you. We will fix it.';
            } else if (labels.some(label => label.name === 'feature')) {
              comment = 'Thank you, we will consider to include this feature.';
            } else if (labels.some(label => label.name === 'discussion')) {
              comment = 'Thanks for starting this discussion! We welcome community input.';
            }
            if (comment) {
              await github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }